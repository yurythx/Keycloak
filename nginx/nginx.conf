# Reverse proxy com terminação TLS na frente do Keycloak.
# Keycloak nunca fica exposto diretamente — só este container publica portas.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Para produção, substitua os arquivos abaixo pelo certificado emitido
    # pela sua CA corporativa (ou Let's Encrypt, se o host for público).
    # Veja README.md > "Gerando certificado TLS" para instruções.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Tokens/cabeçalhos OIDC podem ser grandes (assertions, grupos do AD, etc.)
    client_max_body_size 20m;
    proxy_buffer_size          16k;
    proxy_buffers              4 16k;
    proxy_busy_buffers_size    32k;

    location / {
        proxy_pass http://keycloak:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header Connection        "";
        proxy_http_version 1.1;
    }
}
